name: Code Quality (ratchet)

# Phase 4 gate — Code-quality ratchet (CODE_QUALITY.md).
#
# Until 2026-05-20 this was a measurement-only workflow.
# Phase 1-3.5 closed 92.6% of the lint debt: 1671 → 124 problems and
# 701 → 0 TS errors. Now we flip the gate to **block regressions**.
#
# Policy (2026-05-21 onward):
#   ESLint     fail if  problems != 0     (strict zero — debt is paid off)
#   TypeScript fail if  errors  > LUME_TS_BUDGET  (currently 0)
#
# Lint reached 0 on 2026-05-21. The lint env var (LUME_LINT_BUDGET) is
# retained at 0 only so the step summary still renders a "budget" column;
# the actual gate is strict equality. To re-introduce slack temporarily,
# raise LUME_LINT_BUDGET AND swap the lint compare back to `-gt`.
#
# Note: `env` context is NOT available inside `jobs.<id>.name:` (only
# github/inputs/vars/needs/strategy/matrix are). Earlier revisions of
# this file interpolated `${{ env.LUME_LINT_BUDGET }}` into job names,
# which caused a silent startup-failure (0 check-runs) on every push
# from 2026-05-20 (c14ea623) until 2026-05-21. Don't re-add it.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 20.12.0
  # Ratchet budgets — DROP these as cleanup PRs land, never raise them.
  # Lint hit 0 on 2026-05-21; the gate is now strict equality, see lint step.
  # History: 124 (Phase 3.5, 2026-05-20) → 95 (Phase 3.1 batch 3, 2026-05-21)
  #        → 0 (Phase 3.1 final, 2026-05-21).
  LUME_LINT_BUDGET: 0
  LUME_TS_BUDGET: 0

jobs:
  lint:
    name: ESLint (strict-zero gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Run ESLint
        working-directory: backend
        id: eslint
        run: |
          set +e
          npm run lint 2>&1 | tee eslint-output.log
          set -e
          PROBLEMS=$(grep -oE '[0-9]+ problems' eslint-output.log | tail -1 | grep -oE '[0-9]+' || echo 0)
          ERRORS=$(grep -oE '[0-9]+ errors' eslint-output.log | tail -1 | grep -oE '[0-9]+' || echo 0)
          WARNINGS=$(grep -oE '[0-9]+ warnings' eslint-output.log | tail -1 | grep -oE '[0-9]+' || echo 0)
          BUDGET="${LUME_LINT_BUDGET:-0}"
          {
            echo "## ESLint"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Problems | $PROBLEMS |"
            echo "| Errors | $ERRORS |"
            echo "| Warnings | $WARNINGS |"
            echo "| Budget | $BUDGET |"
            echo ""
            echo "Baseline (2026-05-19): 1671 problems / 1370 errors / 301 warnings."
            echo "Current: $PROBLEMS. Cleanup roadmap: \`docs/CODE_QUALITY.md\`."
          } >> $GITHUB_STEP_SUMMARY

          # Lint debt is paid off — enforce strict zero. To temporarily allow
          # slack, raise LUME_LINT_BUDGET above and swap this back to `-gt`.
          if [ "$PROBLEMS" -ne 0 ]; then
            echo "::error::Lint count $PROBLEMS — must be 0. Fix new issues before merging."
            exit 1
          fi
          echo "::notice::Lint $PROBLEMS / 0 — clean."

  typecheck:
    name: TypeScript typecheck (strict-zero gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Run tsc --noEmit
        working-directory: backend
        id: tsc
        run: |
          set +e
          npm run typecheck 2>&1 | tee tsc-output.log
          set -e
          # `tsc --noEmit` reports errors as `path/file.ts(line,col): error TSxxxx`.
          # Count lines matching that shape; tolerate zero matches with `|| echo 0`.
          ERRORS=$(grep -cE "error TS[0-9]+" tsc-output.log || echo 0)
          BUDGET="${LUME_TS_BUDGET:-0}"
          {
            echo "## TypeScript"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Errors | $ERRORS |"
            echo "| Budget | $BUDGET |"
            echo ""
            echo "Baseline (2026-05-19): ~701 errors."
          } >> $GITHUB_STEP_SUMMARY

          if [ "$ERRORS" -gt "$BUDGET" ]; then
            echo "::error::TypeScript error count $ERRORS exceeds budget $BUDGET."
            exit 1
          fi
          echo "::notice::TypeScript $ERRORS / $BUDGET — within budget."
