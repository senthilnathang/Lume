name: 🐛 Bug report
description: Report a problem with Lume
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security vulnerabilities**, do not file a
        public issue — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Backend (API / module)
        - Admin panel (apps/web-lume)
        - Public site (apps/riagri-website)
        - Database / ORM (Prisma/Drizzle)
        - Build / CI / deployment
        - Docs
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Lume version/commit, Node version, OS, MariaDB version.
      placeholder: |
        Lume: v2.0.0 (commit abc1234)
        Node: 20.x
        OS: Ubuntu 24.04
        MariaDB: 10.11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any errors/stack traces (redact secrets).
      render: shell
