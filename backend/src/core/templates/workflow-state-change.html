<!-- subject: Workflow Update: {{workflowName}} → {{toState}} -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background-color: #f5f5f5; padding: 20px; border-radius: 4px; margin-bottom: 20px; }
    .content { margin: 20px 0; }
    .footer { color: #999; font-size: 12px; margin-top: 30px; border-top: 1px solid #ddd; padding-top: 20px; }
    .button { display: inline-block; background-color: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Workflow Status Update</h2>
    </div>

    <div class="content">
      <p>The workflow <strong>{{workflowName}}</strong> has transitioned:</p>
      <p style="font-size: 16px; margin: 20px 0;">
        <strong>{{fromState}}</strong> → <strong>{{toState}}</strong>
      </p>

      <p>
        <strong>Record:</strong> {{recordId}}<br>
        <strong>Time:</strong> {{timestamp}}
      </p>

      <p style="margin-top: 30px;">
        <a href="{{actionUrl}}" class="button">View Workflow</a>
      </p>
    </div>

    <div class="footer">
      <p>— {{appName}}</p>
    </div>
  </div>
</body>
</html>
