<!-- subject: You have {{notificationCount}} new notifications -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; }
    .header { background: #1890ff; padding: 32px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 24px; }
    .body { padding: 32px; color: #333333; line-height: 1.6; }
    .body h2 { margin-top: 0; }
    .body ul { padding-left: 20px; }
    .body ul li { margin-bottom: 12px; }
    .button { display: inline-block; background: #1890ff; color: #ffffff; padding: 12px 32px; border-radius: 6px; text-decoration: none; font-weight: 600; margin: 16px 0; }
    .footer { padding: 24px 32px; text-align: center; color: #999999; font-size: 12px; border-top: 1px solid #eeeeee; }
  </style>
</head>
<body>
  <div style="padding: 24px;">
    <div class="container">
      <div class="header">
        <h1>{{appName}}</h1>
      </div>
      <div class="body">
        <h2>Notification Digest</h2>
        <p>Hi {{name}}, here are your recent notifications:</p>
        <ul>
          {{notificationList}}
        </ul>
        <p><a href="{{frontendUrl}}" class="button">View All Notifications</a></p>
      </div>
      <div class="footer">
        &copy; {{year}} {{appName}}. All rights reserved.
      </div>
    </div>
  </div>
</body>
</html>
