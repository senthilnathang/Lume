<!DOCTYPE html>
<html>
<head>
    <title>Quick Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Quick Login Test</h1>
    <div id="result">Testing...</div>
    
    <script>
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            
            try {
                // Test 1: Direct API call
                console.log('Testing direct API call...');
                const apiResponse = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@gawdesy.org',
                        password: 'GawdesyAdmin@2024!'
                    })
                });
                
                const apiData = await apiResponse.json();
                console.log('API Response:', apiData);
                
                if (apiData.token) {
                    resultDiv.innerHTML = `
                        <h2 class="success">✅ Login Successful!</h2>
                        <h3>API Response:</h3>
                        <pre>${JSON.stringify(apiData, null, 2)}</pre>
                        <p>JWT Token received: ${apiData.token.substring(0, 50)}...</p>
                        <p>User: ${apiData.user.email} (${apiData.user.role})</p>
                        <p><strong>You can now use these credentials to log in to the admin panel.</strong></p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h2 class="error">❌ Login Failed</h2>
                        <pre>${JSON.stringify(apiData, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2 class="error">❌ Error</h2>
                    <p>${error.message}</p>
                `;
            }
        }
        
        // Run test
        testLogin();
    </script>
</body>
</html>
