<!DOCTYPE html>
<html>
<head>
    <title>Login Test - Final</title>
</head>
<body>
    <h1>Frontend Login Test</h1>
    <div id="result"></div>
    
    <script>
        // Test the login API from frontend context
        async function testLogin() {
            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@gawdesy.org',
                        password: 'GawdesyAdmin@2024!'
                    })
                });
                
                const data = await response.json();
                
                document.getElementById('result').innerHTML = `
                    <h2>Login Test Results:</h2>
                    <p><strong>Status:</strong> ${response.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    ${data.token ? '<p style="color: green;">✅ Login successful! Token received.</p>' : '<p style="color: red;">❌ Login failed</p>'}
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h2>Error:</h2>
                    <p style="color: red;">${error.message}</p>
                `;
            }
        }
        
        // Run test after page loads
        testLogin();
    </script>
</body>
</html>
