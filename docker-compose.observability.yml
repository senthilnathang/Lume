version: '3.9'

# Local Development Observability Stack for Lume Framework
# Includes: Prometheus, Grafana, Jaeger, Elasticsearch, Kibana, AlertManager, Loki, Redis
# Usage: docker-compose -f docker-compose.observability.yml up -d

services:
  # ============================================================================
  # LOGGING INFRASTRUCTURE
  # ============================================================================

  # Elasticsearch - Centralized Log Storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: lume-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=elasticsearch123
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lume_observability
    labels:
      - "com.example.description=Elasticsearch for log aggregation"

  # Kibana - Log Search & Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: lume-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=elasticsearch123
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - kibana_data:/usr/share/kibana/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lume_observability
    labels:
      - "com.example.description=Kibana for log visualization"

  # Loki - Log Aggregation (Alternative to ELK)
  loki:
    image: grafana/loki:2.9.1
    container_name: lume-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yml:ro
    command: -config.file=/etc/loki/local-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lume_observability
    labels:
      - "com.example.description=Loki for log aggregation"

  # ============================================================================
  # METRICS INFRASTRUCTURE
  # ============================================================================

  # Prometheus - Metrics Collection & Storage
  prometheus:
    image: prom/prometheus:v2.46.0
    container_name: lume-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lume_observability
    depends_on:
      - alertmanager
    labels:
      - "com.example.description=Prometheus metrics collection"

  # AlertManager - Alert Management & Routing
  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: lume-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./docker/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lume_observability
    labels:
      - "com.example.description=AlertManager for alert routing"

  # Grafana - Dashboard & Visualization
  grafana:
    image: grafana/grafana:10.1.0
    container_name: lume-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_EMAIL=admin@lume.dev
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - elasticsearch
      - loki
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lume_observability
    labels:
      - "com.example.description=Grafana for metric visualization"

  # ============================================================================
  # TRACING INFRASTRUCTURE
  # ============================================================================

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.48.0
    container_name: lume-jaeger
    restart: unless-stopped
    ports:
      - "6831:6831/udp"  # Jaeger agent UDP (thrift compact)
      - "6832:6832/udp"  # Jaeger agent UDP (thrift binary)
      - "5775:5775/udp"  # Jaeger agent UDP (zipkin compact)
      - "5778:5778/tcp"  # Jaeger agent HTTP (serve frontend)
      - "16686:16686"    # Jaeger UI
      - "14268:14268"    # Jaeger collector HTTP
      - "14250:14250"    # Jaeger collector gRPC
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    volumes:
      - jaeger_data:/badger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14268/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lume_observability
    labels:
      - "com.example.description=Jaeger for distributed tracing"

  # ============================================================================
  # SUPPORT SERVICES
  # ============================================================================

  # Redis - Cache, Session Store, Queue (for app and BullMQ)
  redis:
    image: redis:7.2-alpine
    container_name: lume-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - '--appendonly'
      - 'yes'
      - '--requirepass'
      - 'redis123'
      - '--maxmemory'
      - '256mb'
      - '--maxmemory-policy'
      - 'allkeys-lru'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lume_observability
    labels:
      - "com.example.description=Redis for cache and sessions"

  # MySQL - Application Database (optional - for testing with observability)
  mysql:
    image: mysql:8.0
    container_name: lume-mysql-observability
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: lume_dev
      MYSQL_USER: lume_dev
      MYSQL_PASSWORD: lume123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lume_observability
    labels:
      - "com.example.description=MySQL for application data"

  # ============================================================================
  # INSTRUMENTATION AGENTS (Optional)
  # ============================================================================

  # OpenTelemetry Collector - Receives traces/metrics/logs from apps
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.87.0
    container_name: lume-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"   # OTLP/gRPC receiver
      - "4318:4318"   # OTLP/HTTP receiver
      - "8888:8888"   # Prometheus metrics
      - "8889:8889"   # Prometheus exporter port
    volumes:
      - ./docker/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    depends_on:
      - prometheus
      - jaeger
      - loki
    networks:
      - lume_observability
    labels:
      - "com.example.description=OpenTelemetry Collector for telemetry aggregation"

volumes:
  elasticsearch_data:
    driver: local
  kibana_data:
    driver: local
  loki_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local
  jaeger_data:
    driver: local
  redis_data:
    driver: local
  mysql_data:
    driver: local

networks:
  lume_observability:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
