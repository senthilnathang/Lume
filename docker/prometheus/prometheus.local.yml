# Prometheus Configuration for Lume Local Development
# This configuration is optimized for local development with high-frequency scraping
# and includes all observability targets: app, database, cache, and infrastructure

global:
  # Scraping interval (how often to fetch metrics)
  scrape_interval: 15s

  # Evaluation interval (how often to evaluate alert rules)
  evaluation_interval: 15s

  # External labels added to all time series
  external_labels:
    monitor: 'lume-local'
    environment: 'development'
    version: '2.0.0'

  # Global query timeout
  query_timeout: 2m

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Load alert rules
rule_files:
  - '/etc/prometheus/alert-rules.yml'

# Scrape configurations for different targets
scrape_configs:
  # ============================================================================
  # INTERNAL SERVICES
  # ============================================================================

  # Prometheus self-monitoring (scrape itself)
  - job_name: 'prometheus'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'prometheus:9090'

  # ============================================================================
  # APPLICATION METRICS
  # ============================================================================

  # Lume Backend API - Main application metrics
  - job_name: 'lume-backend'
    metrics_path: '/metrics'
    scheme: 'http'
    static_configs:
      - targets: ['localhost:3000']
        labels:
          service: 'backend'
          environment: 'development'
          application: 'lume'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'backend:3000'
    # Scrape more frequently for development
    scrape_interval: 5s
    scrape_timeout: 5s

  # ============================================================================
  # INFRASTRUCTURE METRICS
  # ============================================================================

  # MySQL Database Metrics
  - job_name: 'mysql'
    static_configs:
      - targets: ['localhost:3306']
        labels:
          service: 'mysql'
          environment: 'development'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'mysql:3306'

  # Redis Cache Metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
        labels:
          service: 'redis'
          environment: 'development'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis:6379'

  # ============================================================================
  # CONTAINER MONITORING (Docker)
  # ============================================================================

  # Docker containers (if cAdvisor is running)
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          service: 'docker'
          environment: 'development'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ============================================================================
  # OBSERVABILITY SERVICES
  # ============================================================================

  # AlertManager self-monitoring
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['localhost:9093']
        labels:
          service: 'alertmanager'
          environment: 'development'

  # OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['localhost:8888']
        labels:
          service: 'otel-collector'
          environment: 'development'

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['localhost:3000']
        labels:
          service: 'grafana'
          environment: 'development'

  # ============================================================================
  # SERVICE DISCOVERY (Optional - for dynamic environments)
  # ============================================================================

  # HTTP service discovery (for applications that advertise themselves)
  - job_name: 'http-sd'
    http_sd_configs:
      - url: 'http://localhost:9090/api/v1/targets'
    relabel_configs:
      - source_labels: [__scheme__]
        target_label: __scheme__
        replacement: 'http'

# ============================================================================
# RECORDING RULES (Computed metrics for faster queries)
# ============================================================================

# Recording rules are loaded via rule_files
# They compute commonly-accessed metrics and store them for faster queries
# Examples:
#   - Rate of HTTP errors per second
#   - P95 latency across all requests
#   - Error rate by status code
#   - Database query times by operation

# ============================================================================
# REMOTE STORAGE (Optional)
# ============================================================================

# Uncomment to send metrics to remote storage (e.g., Cortex, Thanos)
# remote_write:
#   - url: "http://localhost:9009/api/prom/push"
#     queue_config:
#       capacity: 10000
#       max_shards: 100

# remote_read:
#   - url: "http://localhost:9009/api/prom/read"

# ============================================================================
# NOTES FOR LOCAL DEVELOPMENT
# ============================================================================

# 1. Metrics Endpoint
#    The Lume backend exposes metrics at: GET http://localhost:3000/metrics
#    Format: Prometheus text format (exposition format)

# 2. Database Metrics
#    MySQL and Redis metrics are pulled from their standard ports
#    You may need to install exporters for advanced metrics:
#      - mysqld_exporter for MySQL: https://github.com/prometheus/mysqld_exporter
#      - redis_exporter for Redis: https://github.com/oliver006/redis_exporter

# 3. Debugging
#    - Check targets: http://localhost:9090/targets
#    - Query metrics: http://localhost:9090/graph
#    - View rules: http://localhost:9090/alerts
#    - Check TSDB status: http://localhost:9090/tsdb

# 4. Common Queries
#    - HTTP request rate: rate(lume_http_requests_total[5m])
#    - Error rate: rate(lume_errors_total[5m]) / rate(lume_http_requests_total[5m])
#    - P95 latency: histogram_quantile(0.95, lume_http_request_duration_seconds_bucket)
#    - Active DB connections: lume_db_connections_active
