apiVersion: 1

providers:
  # File-based dashboard provider
  - name: 'File Dashboards'
    orgId: 1
    folder: 'Lume'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUpdates: true
    options:
      path: /var/lib/grafana/dashboards

  # Default dashboard provider
  - name: 'Default'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards

# ============================================================================
# DASHBOARD ORGANIZATION
# ============================================================================

# Dashboards will be organized into folders:
# - Lume (main application dashboards)
#   - System Overview
#   - Backend API
#   - Database Performance
#   - Cache Analysis
#   - Error Tracking
#   - Request Tracing
#   - Log Analysis

# ============================================================================
# NOTES
# ============================================================================

# 1. Dashboards are loaded from:
#    - /var/lib/grafana/dashboards/ (custom dashboards)
#    - /etc/grafana/provisioning/dashboards/ (provisioned dashboards)

# 2. Dashboard JSON files should be placed in the directories specified above

# 3. Dashboards are automatically reloaded every 10 seconds

# 4. To add new dashboards:
#    - Create a .json file in /var/lib/grafana/dashboards/
#    - Or use Grafana UI to create and export JSON

# 5. Common dashboard types for Lume:
#    - System metrics (CPU, Memory, Disk)
#    - Application performance (Request rate, Latency, Errors)
#    - Database health (Connections, Queries, Replication)
#    - Cache performance (Hit rate, Evictions)
#    - Trace analysis (Request flow, Bottlenecks)
#    - Log analysis (Error rate, Log volume)
#    - Alert history (Firing, Resolved)
