# ============================================================================
# PROVISIONING NOTES
# ============================================================================

# 1. Datasources are automatically loaded from:
#    /etc/grafana/provisioning/datasources/*.yml

# 2. Changes to this file are reloaded automatically (every ~30 seconds)

# 3. After updating datasources, you may need to update dashboards
#    that reference them

# 4. Test datasource connectivity:
#    - In Grafana: Admin > Data Sources > Select datasource > Test

# 5. To add custom datasources, create new .yml files in this directory
#    following the same format
