# Loki Configuration for Lume Local Development
# Loki is a log aggregation system optimized for containerized environments

auth_enabled: false

ingester:
  chunk_idle_period: 3m
  chunk_retain_period: 1m
  max_chunk_age: 1h
  chunk_encoding: snappy
  chunk_size_limit_bytes: 0
  max_streams_limit_per_user: 10000
  max_global_streams_limit_per_user: 10000

limits_config:
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_streams_limit_per_user: 10000
  max_global_streams_limit_per_user: 10000
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 15MB
  max_cache_freshness_per_query: 10m

schema_config:
  configs:
    - from: 2021-08-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks
  boltdb_shipper:
    active_index_directory: /loki/index
    shared_store: filesystem
    cache_location: /loki/index_cache

runtime_config:
  file: /etc/loki/runtime.yml
  period: 10s

querier:
  # Default number of loggly requests to send in parallel when querying logs in parallel mode.
  max_concurrent: 20
  # Maximum number of queries to be executed in parallel mode
  max_samples: 1000000

query_range:
  # minimum time step for range queries.
  min_shards: 1
  max_shards: 128
  results_cache:
    cache:
      enable_fifocache: true
      default_validity: 1m
      background:
        writeback_goroutines: 10
        writeback_chan_size: 10000
      memcached_client:
        max_idle_conns: 100
        update_interval: 1m
        stale_ttl: 1m
        addresses: localhost

chunk_store_config:
  max_look_back_period: 0s
  cache_config:
    enable_fifocache: true
    default_validity: 10m
    background:
      writeback_goroutines: 10
      writeback_chan_size: 10000

table_manager:
  retention_deletes_enabled: false
  retention_period: 0s

# Server configuration
server:
  http_listen_port: 3100
  log_level: info
  log_format: json

# This configures how the logs will be indexed by Loki
# (see https://grafana.com/docs/loki/latest/getting-started/labels/)
analytics:
  reporting_enabled: false
